<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS · Maintenance</title>
  <meta name="theme-color" content="#0B1026">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --night-sky: #05020a;
      --neon-magenta: #ff007f;
      --neon-purple: #8b5cf6;
      --neon-cyan: #00f0ff;
      --text-light: #f8fafc;
      --muted-grey: #475569;
      --glass-border: rgba(139, 92, 246, 0.25);
    }

    body {
      min-height: 100vh;
      background: var(--night-sky);
      background-image: 
        radial-gradient(circle at 50% 10%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(255, 0, 127, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
        linear-gradient(180deg, #05020a 0%, #090414 100%);
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(139, 92, 246, 0.01) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.01) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    .centerpiece {
      position: relative;
      z-index: 2;
      max-width: 900px;
      width: 100%;
      text-align: center;
      animation: coreBoot 0.8s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }

    @keyframes coreBoot {
      0% { opacity: 0; transform: scale(0.98) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .brand {
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--neon-cyan);
      margin-bottom: 2.5rem;
      border: 1px dashed var(--glass-border);
      padding: 3px 12px;
      display: inline-block;
      background: rgba(0, 240, 255, 0.02);
    }

    .status-card {
      background: rgba(12, 5, 23, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      margin: 1.5rem auto 2.5rem;
      max-width: 650px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      transition: all 0.3s ease;
    }

    .status-icon {
      font-size: 3rem;
      color: var(--neon-magenta);
      margin-bottom: 1rem;
      display: block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.3; transform: scale(1); }
    }

    .status-title {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .status-desc {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.7;
      max-width: 450px;
      margin: 0 auto;
    }

    .status-desc strong {
      color: var(--neon-cyan);
      font-weight: 500;
    }

    .main-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.9rem 2.5rem;
      background: linear-gradient(135deg, var(--neon-magenta), #b900ff);
      border: none;
      border-radius: 50px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(255, 0, 127, 0.15);
    }
    

    .main-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(255, 0, 127, 0.3);
    }

    .main-btn i {
      margin-right: 8px;
    }

    .footnote {
      font-family: 'Fira Code', monospace;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted-grey);
    }

    /* Bottom Dock */
    .bottom-dock {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 400px;
      background: rgba(12, 5, 23, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-around;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      z-index: 99;
    }

    .dock-item {
      color: #64748b;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-family: 'Fira Code', monospace;
      transition: all 0.3s;
    }

    .dock-item i {
      font-size: 1.15rem;
      transition: transform 0.2s;
    }

    .dock-item:hover { color: #ffffff; }
    .dock-item:hover i { transform: translateY(-2px); }
    .dock-call:hover i { color: #38bdf8; text-shadow: 0 0 10px #38bdf8; }
    .dock-whatsapp:hover i { color: #22c55e; text-shadow: 0 0 10px #22c55e; }
    .dock-instagram:hover i { color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta); }

    @media (max-width: 500px) {
      .status-card { padding: 1.5rem 1rem; }
      .bottom-dock { max-width: 90%; }
      .main-btn { padding: 0.7rem 1.8rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="centerpiece">
    <div class="brand"><span> ✦ RS ✦</span></div>

    <!-- Status Card -->
    <div class="status-card">
      <span class="status-icon"><i class="fas fa-code-branch"></i></span>
      <div class="status-title">Currently Unavailable</div>
      <div class="status-desc">
        <strong>Rehan Sandhi</strong> is currently reconfiguring this site. 
        <br>
        This site is temporarily unavailable.
        <br><br>
        All active services are still accessible via <strong>RS App Store</strong>.
      </div>
      <a href="https://rs-appstore.blogspot.com" target="_blank" class="main-btn">
        <i class="fas fa-store"></i> Visit RS App Store
      </a>
    </div>

    <div class="footnote">
      <span>✦ reconnect with the RS App Store✦</span>
    </div>
  </div>

  <!-- Floating Social Dock -->
  <div class="bottom-dock">
    <a href="tel:+919725936153" class="dock-item dock-call">
      <i class="fas fa-phone"></i>
      <span>Call</span>
    </a>
    <a href="https://wa.me/919725936153" target="_blank" class="dock-item dock-whatsapp">
      <i class="fab fa-whatsapp"></i>
      <span>WhatsApp</span>
    </a>
    <a href="https://instagram.com/rehan_sandhi_181" target="_blank" class="dock-item dock-instagram">
      <i class="fab fa-instagram"></i>
      <span>Instagram</span>
    </a>
  </div>
</body>
</html>
