<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

    --gold-light: #e8c97a;
    --gold-dark: #8a6c28;

    --parchment: #f5ede0;
    --cream: #fdf8f0;

    --mist: #2d2520;
    --correct: #2d6a4f;
    --correct-light: #40916c;
    --wrong: #8b1a1a;
    --wrong-light: #c1272d;

    --text-muted: #6b5d50;
    --border: rgba(201,168,76,0.25);

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    color: var(--parchment);
  }

  /* Ambient Background */

    position: fixed; inset: 0;
    background:

      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(139,107,42,0.05) 0%, transparent 60%),

    z-index: 0;

    pointer-events: none;
    z-index: 0;

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;

  /* Header */
  .site-header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.8s ease both;
  }

  .ornament {
    display: block;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    opacity: 0.8;
  }

  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow:
      0 0 60px rgba(201,168,76,0.3),
      0 2px 4px rgba(0,0,0,0.6);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .site-subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-top: 0.5rem;
    font-weight: 500;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 480px;
    margin: 0 auto 2rem;
    animation: fadeIn 1s ease 0.3s both;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  }

  .divider-gem {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 8px var(--gold);
  }

  /* Card */
  .card {
    background: rgba(26,18,12,0.85);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 640px;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.08),
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(201,168,76,0.1);
    backdrop-filter: blur(8px);
    animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* Intro screen */
  #intro-screen {
    text-align: center;
  }

  .intro-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-bottom: 1.2rem;
    font-weight: 500;
  }

  .intro-quote {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    font-style: italic;
    color: var(--parchment);
    line-height: 1.7;
    position: relative;
    padding: 0 1.5rem;
    margin-bottom: 0.8rem;
  }

  .intro-quote::before {
    content: '\201C';
    position: absolute;
    left: 0; top: -0.3em;
    font-size: 3rem;
    color: var(--gold);
    font-style: normal;
    line-height: 1;
    opacity: 0.6;
  }

  .intro-author {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .btn-start {
    display: inline-block;
    padding: 0.9rem 3rem;
    background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    background-size: 200% auto;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3), 0 0 0 1px rgba(201,168,76,0.3);
    transition: background-position 0.4s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-start:hover {
    background-position: right center;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.5), 0 0 0 1px rgba(201,168,76,0.5);
  }

  .btn-start:active { transform: translateY(0); }

  /* Quiz screen */
  #quiz-screen { display: none; }

  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dark);
    font-weight: 500;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 2px;
    background: rgba(201,168,76,0.12);
    border-radius: 1px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 1px;
    transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 0 8px rgba(201,168,76,0.6);
  }

  .quote-block {
    margin-bottom: 2rem;
    animation: fadeIn 0.4s ease both;
  }

  .quote-text {

    font-size: clamp(1.1rem, 2.8vw, 1.45rem);
    font-style: italic;
    color: var(--parchment);
    line-height: 1.75;
    position: relative;
    padding-left: 2rem;
    border-left: 2px solid rgba(201,168,76,0.3);
  }

  .quote-text::before {
    content: '\201C';
    position: absolute;
    left: 0.1rem; top: -0.5rem;
    font-size: 2.5rem;
    color: var(--gold);
    font-style: normal;
    line-height: 1;
    opacity: 0.5;
  }

  .options-grid {
    display: grid;
    gap: 0.75rem;
    animation: fadeIn 0.4s ease 0.1s both;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    padding: 0.9rem 1.2rem;
    background: rgba(201,168,76,0.04);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 3px;
    color: var(--parchment);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 400;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .option-letter {
    min-width: 28px; height: 28px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--gold-dark);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(201,168,76,0.1);
    border-color: rgba(201,168,76,0.4);
    transform: translateX(4px);
  }

  .option-btn:hover:not(:disabled) .option-letter {
    background: rgba(201,168,76,0.2);
    color: var(--gold-light);
  }

  .option-btn:disabled { cursor: default; }

  .option-btn.correct {
    background: rgba(45,106,79,0.25);
    border-color: var(--correct-light);
    color: #a7f3cc;
  }

  .option-btn.correct .option-letter {
    background: var(--correct);
    border-color: var(--correct-light);
    color: #fff;
  }

  .option-btn.wrong {
    background: rgba(139,26,26,0.2);
    border-color: var(--wrong-light);
    color: #fca5a5;
    animation: shake 0.35s ease;
  }

  .option-btn.wrong .option-letter {
    background: var(--wrong);
    border-color: var(--wrong-light);
    color: #fff;
  }

  .option-btn.dimmed {
    opacity: 0.35;
  }

  #result-screen {
    display: none;
    text-align: center;
  }

  .result-badge {
    width: 100px; height: 100px;
    margin: 0 auto 1.5rem;
    border-radius: 50%;
    border: 2px solid var(--gold-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    background: rgba(201,168,76,0.06);
    box-shadow: 0 0 30px rgba(201,168,76,0.15), inset 0 0 30px rgba(201,168,76,0.05);

  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
    animation: popIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both;

  .result-label {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin: 0.4rem 0 1rem;

    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-style: italic;
    color: var(--parchment);
    opacity: 0.85;
    margin-bottom: 2rem;

    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));

    color: var(--ink);
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    transition: background-position 0.4s, transform 0.2s, box-shadow 0.2s;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 1.5rem;
  }

  .btn-replay:hover {
    background-position: right center;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.5);
  }

  .explore-link {
    display: block;
    margin-top: 0.5rem;
    font-size: 0.78rem;
    color: var(--gold-dark);
    text-decoration: none;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    transition: color 0.2s;
  }

  .explore-link:hover {
    color: var(--gold-light);
  }

  .explore-link span {
    border-bottom: 1px solid currentColor;
    padding-bottom: 1px;
  }
          .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-tertiary);

            color: var(--accent);

            transition: opacity 0.2s;
        }
        .footer a:hover {
            text-decoration: underline;
            opacity: 0.9;
        }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.75); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Hide/show utility */
  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.4rem; }
    .quote-text { font-size: 1.05rem; padding-left: 1.4rem; }
  }
</style>
</head>

const LETTERS = ['A','B','C','D'];

let gameQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;

// Pick a random splash quote on load
(function initSplash() {
  const q = ALL_QUESTIONS[Math.floor(Math.random() * ALL_QUESTIONS.length)];
  document.getElementById('splash-quote').textContent = q.q;
  document.getElementById('splash-author').textContent = '— ' + q.o[q.a];
})();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  gameQuestions = shuffle(ALL_QUESTIONS).slice(0, 10);
  currentIndex = 0;
  score = 0;
  answered = false;

  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';

  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = gameQuestions[currentIndex];
  const num = currentIndex + 1;

  document.getElementById('q-counter').textContent = `Question ${num} / 10`;
  document.getElementById('q-score').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${num * 10}%`;
  document.getElementById('quiz-quote').textContent = q.q;

  const container = document.getElementById('options-container');
  container.innerHTML = '';

  // Shuffle options while tracking correct answer
  const indexed = q.o.map((text, i) => ({ text, isCorrect: i === q.a }));
  const shuffled = shuffle(indexed);

  shuffled.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.correct = opt.isCorrect;
    btn.innerHTML = `<span class="option-letter">${LETTERS[i]}</span> ${opt.text}`;
    btn.onclick = () => handleAnswer(btn);
    container.appendChild(btn);
  });
}

function handleAnswer(btn) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.option-btn');
  const isCorrect = btn.dataset.correct === 'true';

  allBtns.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === 'true') {
      b.classList.add('correct');
    } else if (b === btn && !isCorrect) {
      b.classList.add('wrong');
    } else {
      b.classList.add('dimmed');
    }
  });

  if (isCorrect) score++;

  setTimeout(() => {
    currentIndex++;
    if (currentIndex < 10) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 1100);
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  document.getElementById('result-score-text').textContent = `${score} / 10`;

  let emoji, msg;
  if (score <= 3) {
    emoji = '📜'; msg = 'Every legend started as a student. Keep seeking wisdom.';
  } else if (score <= 6) {
    emoji = '🏛️'; msg = 'A promising scholar of legends. Keep learning.';
  } else if (score <= 8) {
    emoji = '✨'; msg = 'You walk among the wise. Impressive knowledge!';
  } else {
    emoji = '🔥'; msg = 'Legend Level! You truly know the voices of history.';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-message').textContent = msg;
}

function resetQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  startQuiz();
}
